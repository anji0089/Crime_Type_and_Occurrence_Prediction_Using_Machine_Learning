{% extends 'base.html' %}

{% block contents %}
<div class="login-container">
    <form class="login-form" action="{% url 'userbase' %}" method="post">
        {% csrf_token %}
        <h2>Login</h2>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-button">Login</button>
        <a href="#" class="forgot-password">Forgot password?</a>
    </form>
</div>
<style>
.login-container {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    background-color:rgba(186, 190, 190, 0.774);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    border-radius: 30px;
    position: absolute;
    top: 35%;   /* Positioning at the vertical center */
    left: 45%;  /* Positioning at the horizontal center */
    transform: translate(-50%, -50%); /* Adjusting to truly center it */
    margin: 60px; /* Retaining custom margin for spacing */
}

.login-form h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 16px;
    box-sizing: border-box;
}

.login-button {
    width: 100%;
    padding: 10px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.login-button:hover {
    background-color: #45a049;
}

.forgot-password {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #007BFF;
    text-decoration: none;
    font-size: 14px;
}

.forgot-password:hover {
    text-decoration: underline;
}
</style>


{% endblock %}
